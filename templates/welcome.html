<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RiskSense AI</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            /* Slight dark premium gradient */
            background: linear-gradient(135deg, #0a0f1c, #111827, #0f2027);

            font-family: 'Segoe UI', sans-serif;
            color: #e0f7ff;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 0 0 12px rgba(0, 229, 255, 0.6);
        }

        h2 {
            font-size: 16px;
            color: #9bdfff;
            margin-bottom: 30px;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 229, 255, 0.3);
            border-top: 4px solid #00e5ff;
            border-radius: 50%;
            margin: auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .status {
            margin-top: 20px;
            font-size: 13px;
            color: #a0cfe0;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>RiskSense AI</h1>
    <h2>AI-Powered Fraud Detection System</h2>

    <div class="loader"></div>

    <div class="status">
        Initializing Smart Risk Analysis...
    </div>
</div>

<script>
    // redirect after 3 seconds
    setTimeout(function () {
        window.location.href = "/dashboard";
    }, 3000);
</script>

</body>
</html>
