<!DOCTYPE html>
<html>
<head>
    <title>RiskSense AI</title>

    <!-- 🔥 ADDED: Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        select {
            background: rgba(255,255,255,0.08);
            color: white;
        }

        select option {
            background: #1e1e1e; 
            color: white;
        }

        select option:hover {
            background: #00e5ff;
            color: black;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            position: relative;
        }

        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            width: auto;
        }

        .container {
            background: rgba(30, 30, 30, 0.70);
            backdrop-filter: blur(6px);
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.18);
            width: 380px;
            text-align: center;
            max-height: 90vh;
            overflow-y: auto;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            color: white;
            border: none;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #eefcff, #66ecff);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            box-sizing: border-box;
        }

        .secondary-btn {
            margin-top: 10px;
        }

        #status {
            margin-top: 16px;
            font-size: 18px;
            font-weight: bold;
        }

        .safe {
            color: #00ff99;
            font-size: 20px;
            text-shadow: 0 0 10px rgba(0,255,153,0.8);
            animation: blinkSafe 1s infinite;
        }

        .fraud {
            color: #ff4d4d;
            font-size: 20px;
            text-shadow: 0 0 10px rgba(255,77,77,0.8);
            animation: blinkFraud 1s infinite;
        }

        @keyframes blinkSafe {
            0%,100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @keyframes blinkFraud {
            0%,100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .progress {
            width: 100%;
            height: 16px;
            background: #6a5a52;
            border-radius: 10px;
            margin: 16px auto;
            overflow: hidden;
            box-sizing: border-box;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: width 0.8s ease;
        }

        #percent {
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<button class="logout-btn" onclick="window.location.href='/'">Logout</button>

<div class="container">

    <h2>AI Transaction Risk Analyzer</h2>

    <form method="POST" action="/predict">
        <input name="userId" id="userId" type="text" placeholder="Enter User ID" required>
        <input name="amount" id="amount" type="number" placeholder="Enter Transaction Amount" required>

        <select name="time" id="time" required>
            <option value="">Processing Time</option>
            <option value="0">Instant</option>
            <option value="1">1 sec</option>
            <option value="2">2 sec</option>
        </select>

        <input name="failed_attempts" id="failed_attempts" type="number" placeholder="Failed Attempts" required>

        <select name="is_new_device" id="is_new_device" required>
            <option value="">Is New Device?</option>
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select>

        <input name="avg_amount" id="avg_amount" type="number" placeholder="Average Transaction Amount" required>

        <button type="submit">Analyze Transaction</button>
    </form>

    <p id="status"></p>

    <div class="progress">
        <div id="bar" class="progress-bar"></div>
    </div>

    <p id="percent">0%</p>

    <button class="secondary-btn" onclick="resetForm()">Check Another Transaction</button>

    <!-- 🔥 ADDED GRAPH -->
    <h3 style="margin-top: 20px;">Risk Trend</h3>
    <canvas id="riskChart" height="120"></canvas>

    <div style="margin-top: 25px; text-align: left;">
        <h3 style="margin-bottom: 12px;">Recent Transactions</h3>
        <div id="historyBox" style="max-height: 220px; overflow-y: auto;">
            <p style="opacity: 0.7;">No recent transactions yet.</p>
        </div>
    </div>

</div>

<script>
    let risk = parseFloat('{{ risk|default(0) }}') || 0;
    let result = "{{ result|default('') }}";
    let userIdFromServer = "{{ userId|default('') }}";
    let amountFromServer = "{{ amount|default('') }}";
    let timeFromServer = "{{ time|default('') }}";
    let failedAttemptsFromServer = "{{ failed_attempts|default('') }}";
    let isNewDeviceFromServer = "{{ is_new_device|default('') }}";
    let avgAmountFromServer = "{{ avg_amount|default('') }}";

    let status = document.getElementById("status");
    let bar = document.getElementById("bar");
    let percentText = document.getElementById("percent");
    let historyBox = document.getElementById("historyBox");

    function getCurrentTime() {
        return new Date().toLocaleString();
    }

    function getProcessingTimeText(v){ return v=="0"?"Instant":v=="1"?"1 sec":v=="2"?"2 sec":"N/A"; }
    function getNewDeviceText(v){ return v=="1"?"Yes":v=="0"?"No":"N/A"; }

    function saveTransaction(userId, amount, timeText, resultText, riskValue, failedAttempts, isNewDevice, avgAmount) {
        let t = JSON.parse(localStorage.getItem("recentTransactions")) || [];

        t.unshift({userId,amount,processingTime:timeText,result:resultText,risk:riskValue,failedAttempts,isNewDevice,avgAmount,timestamp:getCurrentTime()});
        if(t.length>5) t=t.slice(0,5);

        localStorage.setItem("recentTransactions", JSON.stringify(t));
    }

    function renderTransactions() {
        let t = JSON.parse(localStorage.getItem("recentTransactions")) || [];

        if (!t.length) {
            historyBox.innerHTML = '<p style="opacity:0.7;">No recent transactions yet.</p>';
            return;
        }

        historyBox.innerHTML = "";

        t.forEach(txn=>{
            let color = txn.result.includes("Fraud")?"#ff4d4d":"#00ff99";

            historyBox.innerHTML += `
            <div style="background:rgba(255,255,255,0.06);border-radius:10px;padding:10px;margin-bottom:10px;font-size:13px;">
            <div><b>User ID:</b> ${txn.userId}</div>
            <div><b>Amount:</b> ₹${txn.amount}</div>
            <div><b>Risk:</b> ${txn.risk}%</div>
            <div><b>Status:</b> <span style="color:${color};font-weight:bold;">${txn.result}</span></div>
            </div>`;
        });
    }

    // 🔥 CHART
    function drawChart(){
        let t = JSON.parse(localStorage.getItem("recentTransactions")) || [];
        if(!t.length) return;

        let ctx = document.getElementById("riskChart").getContext("2d");

        if(window.chart) window.chart.destroy();

        window.chart = new Chart(ctx,{
            type:"line",
            data:{
                labels:t.map((_,i)=>"T"+(i+1)).reverse(),
                datasets:[{
                    data:t.map(x=>x.risk).reverse(),
                    borderColor:"#00e5ff",
                    backgroundColor:"rgba(0,229,255,0.1)",
                    fill:true
                }]
            },
            options:{plugins:{legend:{display:false}}}
        });
    }

    if (result !== "") {
        status.innerText = result;

        if (result.includes("Fraud")) {
            status.className = "fraud";
            bar.style.background = "#ff4d4d";

            // 🚨 ALERT
            setTimeout(()=>alert("🚨 FRAUD DETECTED!"),300);

        } else {
            status.className = "safe";
            bar.style.background = "#00ff99";
        }

        bar.style.width = risk + "%";
        percentText.innerText = "Risk Score: " + risk + "%";

        saveTransaction(userIdFromServer,amountFromServer,getProcessingTimeText(timeFromServer),result,risk,failedAttemptsFromServer,getNewDeviceText(isNewDeviceFromServer),avgAmountFromServer);
    }

    function resetForm() {
        window.location.href = "/dashboard";
    }

    renderTransactions();
    drawChart();
</script>

</body>
</html>
