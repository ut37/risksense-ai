<!DOCTYPE html>
<html>
<head>
    <title>RiskSense AI</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            color: white;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        }

        .layout {
            display: flex;
            gap: 25px;
            margin-top: 70px;
        }

        .side {
            width: 240px;
            background: rgba(10, 15, 20, 0.9);
            border-radius: 18px;
            padding: 20px;
            text-align: center;
            min-height: 650px;
        }

        .side:hover {
            box-shadow: 0 0 25px rgba(0,229,255,0.5);
        }

        .container {
            background: rgba(30, 30, 30, 0.85);
            padding: 35px;
            border-radius: 18px;
            width: 380px;
            min-height: 650px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            color: white;
            border: none;
        }

        button {
            padding: 12px;
            background: linear-gradient(to right, #eefcff, #66ecff);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            transform: scale(1.05);
        }

        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ff4d4d;
            padding: 8px 14px;
            border-radius: 8px;
            border: none;
            color: white;
            cursor: pointer;
            width: auto;
        }

        .progress {
            width: 100%;
            height: 16px;
            background: #6a5a52;
            border-radius: 10px;
            margin: 16px auto;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            border-radius: 10px;
        }

        .safe { color: #00ff99; }
        .fraud { color: #ff4d4d; }

        .stat-box {
            background: rgba(255,255,255,0.05);
            margin: 10px 0;
            padding: 12px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .stat-box:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px #00e5ff;
        }
    </style>
</head>

<body>

<button class="logout-btn" onclick="window.location.href='/'">Logout</button>

<div class="layout">

    <!-- LEFT PANEL -->
    <div class="side">
        <h3>System Info</h3>
        <hr>
        <p>🤖 AI Fraud Detection</p>
        <p>⚡ Real-time Analysis</p>
        <p>🔒 Secure Transactions</p>
        <hr>
        <p style="color:#00ff99;">● System Active</p>
        <p id="clock"></p>
    </div>

    <!-- MAIN -->
    <div class="container">

        <h2>AI Transaction Risk Analyzer</h2>

        <form method="POST" action="/predict" id="form">
            <input name="userId" required placeholder="User ID">
            <input name="amount" type="number" required placeholder="Amount">

            <select name="time" required>
                <option value="">Time</option>
                <option value="0">Instant</option>
                <option value="1">1 sec</option>
                <option value="2">2 sec</option>
            </select>

            <input name="failed_attempts" type="number" required placeholder="Failed Attempts">

            <select name="is_new_device" required>
                <option value="">New Device?</option>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>

            <input name="avg_amount" type="number" required placeholder="Avg Amount">

            <button type="submit">Analyze Transaction</button>
        </form>

        <p id="status"></p>
        <p id="riskLevel"></p>

        <div class="progress">
            <div id="bar" class="progress-bar"></div>
        </div>

        <p id="percent">0%</p>

        <button onclick="resetForm()">Check Another Transaction</button>

        <h3>Risk Trend</h3>
        <canvas id="riskChart" height="120"></canvas>

        <h3>Recent Transactions</h3>
        <div id="recent" style="max-height:150px; overflow-y:auto;"></div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="side">
        <h3>Live Stats</h3>

        <div class="stat-box">
            <h4>Total</h4>
            <p id="total">0</p>
        </div>

        <div class="stat-box">
            <h4 style="color:#ff4d4d;">Fraud</h4>
            <p id="frauds">0</p>
        </div>

        <div class="stat-box">
            <h4 style="color:#00ff99;">Safe</h4>
            <p id="safe">0</p>
        </div>

        <h4>Fraud Rate</h4>
        <p id="rate">0%</p>
    </div>

</div>

<script>
let risk = parseFloat('{{ risk|default(0) }}') || 0;
let result = "{{ result|default('') }}";

let status = document.getElementById("status");
let bar = document.getElementById("bar");

// CLOCK
setInterval(()=>{
    document.getElementById("clock").innerText = new Date().toLocaleTimeString();
},1000);

// VALIDATION
document.getElementById("form").addEventListener("submit", function(e){
    let amount = document.querySelector("[name='amount']").value;
    if(amount <= 0){
        alert("Amount must be > 0");
        e.preventDefault();
    }
});

// 🔥 NEW FEATURES
function showConfidence(risk){
    let confidence = Math.min(100, Math.max(60, risk + Math.floor(Math.random()*20)));
    let el = document.createElement("p");
    el.innerText = "Confidence: " + confidence + "%";
    el.style.color="#00e5ff";
    document.querySelector(".container").appendChild(el);
}

function compareRisk(risk){
    let arr = JSON.parse(localStorage.getItem("riskData")) || [];
    if(arr.length < 2) return;

    let diff = risk - arr[arr.length-2];
    let el = document.createElement("p");

    if(diff>0){
        el.innerText="⬆ Risk Increased by "+diff+"%";
        el.style.color="#ff4d4d";
    } else {
        el.innerText="⬇ Risk Decreased by "+Math.abs(diff)+"%";
        el.style.color="#00ff99";
    }

    document.querySelector(".container").appendChild(el);
}

function showReason(){
    let amount = document.querySelector("[name='amount']").value;
    let failed = document.querySelector("[name='failed_attempts']").value;
    let device = document.querySelector("[name='is_new_device']").value;

    let reasons=[];
    if(amount>5000) reasons.push("High Amount");
    if(failed>2) reasons.push("Multiple Failed Attempts");
    if(device==1) reasons.push("New Device");

    if(reasons.length){
        let el=document.createElement("p");
        el.innerText="Reason: "+reasons.join(", ");
        el.style.color="#ffaa00";
        document.querySelector(".container").appendChild(el);
    }
}

// RISK LEVEL
function showRiskLevel(risk){
    let el=document.getElementById("riskLevel");
    if(risk<30){ el.innerText="Low Risk"; el.style.color="#00ff99";}
    else if(risk<70){ el.innerText="Medium Risk"; el.style.color="#ffaa00";}
    else{ el.innerText="High Risk"; el.style.color="#ff4d4d";}
}

// STATS
function loadStats(){
    document.getElementById("total").innerText=localStorage.getItem("total")||0;
    document.getElementById("frauds").innerText=localStorage.getItem("frauds")||0;
    document.getElementById("safe").innerText=localStorage.getItem("safe")||0;
}

function updateStats(result){
    let t=parseInt(localStorage.getItem("total"))||0;
    let f=parseInt(localStorage.getItem("frauds"))||0;
    let s=parseInt(localStorage.getItem("safe"))||0;

    t++;
    if(result.includes("Fraud")) f++; else s++;

    localStorage.setItem("total",t);
    localStorage.setItem("frauds",f);
    localStorage.setItem("safe",s);

    document.getElementById("rate").innerText=Math.round((f/t)*100)+"%";
    loadStats();
}

// GRAPH
function drawLine(){
    let arr=JSON.parse(localStorage.getItem("riskData"))||[];
    if(!arr.length) return;

    let ctx=document.getElementById("riskChart").getContext("2d");

    if(window.line) window.line.destroy();

    window.line=new Chart(ctx,{
        type:"line",
        data:{
            labels:arr.map((_,i)=>"T"+(i+1)),
            datasets:[{data:arr,borderColor:"#00e5ff"}]
        }
    });
}

// RECENT
function addRecent(result,risk){
    let list=JSON.parse(localStorage.getItem("recent"))||[];
    list.unshift({result,risk,time:new Date().toLocaleTimeString()});
    if(list.length>5) list.pop();
    localStorage.setItem("recent",JSON.stringify(list));
    displayRecent();
}

function displayRecent(){
    let list=JSON.parse(localStorage.getItem("recent"))||[];
    let div=document.getElementById("recent");
    div.innerHTML="";
    list.forEach(i=>{
        let c=i.result.includes("Fraud")?"#ff4d4d":"#00ff99";
        div.innerHTML+=`<p style="color:${c}">${i.result} (${i.risk}%) - ${i.time}</p>`;
    });
}

// RESULT
if(result!==""){
    status.innerText=result;

    if(result.includes("Fraud")){
        status.className="fraud";
        bar.style.background="#ff4d4d";
    } else {
        status.className="safe";
        bar.style.background="#00ff99";
    }

    showRiskLevel(risk);
    showConfidence(risk);
    compareRisk(risk);
    showReason();

    let i=0;
    let interval=setInterval(()=>{
        if(i>=risk) clearInterval(interval);
        else{
            i++;
            bar.style.width=i+"%";
            document.getElementById("percent").innerText="Risk Score: "+i+"%";
        }
    },10);

    let arr=JSON.parse(localStorage.getItem("riskData"))||[];
    arr.push(risk);
    localStorage.setItem("riskData",JSON.stringify(arr));

    updateStats(result);
    addRecent(result,risk);
}

loadStats();
drawLine();
displayRecent();

function resetForm(){
    window.location.href="/dashboard";
}
</script>

</body>
</html>
