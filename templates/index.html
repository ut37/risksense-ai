
<!DOCTYPE html>
<html>

<head>
<title>RiskSense AI</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.container{
background:#1e1e1e;
padding:40px;
border-radius:12px;
box-shadow:0 0 25px rgba(0,229,255,0.3);
width:360px;
text-align:center;
}

h2{
margin-bottom:5px;
color:#00e5ff;
}

.subtitle{
font-size:13px;
color:#bbb;
margin-bottom:20px;
}

input{
width:90%;
padding:12px;
margin:10px 0;
border:1px solid #444;
border-radius:6px;
background:#2b2b2b;
color:white;
font-size:14px;
}

input::placeholder{
color:#aaa;
}

button{
width:95%;
padding:12px;
background:linear-gradient(to right,#00c6ff,#0072ff);
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.result{
margin-top:20px;
font-size:18px;
font-weight:bold;
}

progress{
width:100%;
height:20px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>🔐 RiskSense AI</h2>
<p class="subtitle">Machine Learning based transaction risk analysis</p>

<form action="/predict" method="post">

<input type="number" name="amount" placeholder="Transaction Amount" required>

<input type="number" name="time" placeholder="Transaction Time" required>

<input type="number" name="user" placeholder="User ID" required>

<button type="submit">Predict Risk</button>

</form>

{% if prediction_text %}

<div class="result">

{% if prediction_text %}
<h3 style="color: {{color}}">{{ prediction_text }}</h3>

<p>Fraud Risk Probability: {{prob}} %</p>

<progress value="{{prob}}" max="100"
style="accent-color: {{color}};"></progress>

<button onclick="window.location.href='/'" 
style="background:#444;margin-top:15px">
Check Another Transaction
</button>

{% endif %}

</div>
{% endif %}

</div>

</body>

</html>
