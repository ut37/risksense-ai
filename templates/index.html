<!DOCTYPE html>
<html>
<head>
    <title>RiskSense AI</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
       body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    margin: 0;
    color: white;

    display: flex;
    justify-content: center;

    align-items: flex-start;   
    min-height: 100vh;
    overflow-y: auto;          
}

        .layout {
            display: flex;
            gap: 25px;
            align-items: stretch;
        }
        html, body {
    height: auto;
}

        .side {
            width: 240px;
            background: rgba(10, 15, 20, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            padding: 20px;
            text-align: center;

            border: 1px solid rgba(0, 229, 255, 0.3);

            display: flex;
            flex-direction: column;
            justify-content: center;

            animation: glowPulse 3s infinite alternate;
             min-height: 650px;
}
        

        @keyframes glowPulse {
            0% {
                box-shadow: 0 0 10px rgba(0,229,255,0.2);
            }
            100% {
                box-shadow: 0 0 30px rgba(0,229,255,0.5);
            }
        }

        .container {
            background: rgba(30, 30, 30, 0.75);
            padding: 35px;
            border-radius: 18px;
            width: 380px;
            height: 650px;
            text-align: center;
            overflow: hidden;
             min-height: 650px;
             box-shadow: 0 0 25px rgba(0, 229, 255, 0.2);
        }
        

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            color: white;
            border: none;
        }

        select option {
            background: #0b1a20;
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #eefcff, #66ecff);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #00e5ff;
        }

        .secondary-btn { margin-top: 10px; }

        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ff4d4d;
            padding: 8px 14px;
            border-radius: 8px;
            border: none;
            color: white;
            cursor: pointer;
            z-index: 1000;
             width: auto !important;   
    display: inline-block;    
    font-size: 13px;
    font-weight: bold;

        }


        .progress {
            width: 100%;
            height: 16px;
            background: #6a5a52;
            border-radius: 10px;
            margin: 16px auto;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            border-radius: 10px;
        }

        .safe { color: #00ff99; }
        .fraud { color: #ff4d4d; }
    </style>
</head>

<body>

<button class="logout-btn" onclick="window.location.href='/'">Logout</button>

<div class="layout">

    <!-- LEFT PANEL -->
    <div class="side">
        <h3>Fraud Analysis</h3>
        <canvas id="pieChart"></canvas>
    </div>

    <!-- MAIN -->
    <div class="container">

        <h2>AI Transaction Risk Analyzer</h2>

        <form method="POST" action="/predict">
            <input name="userId" required placeholder="User ID">
            <input name="amount" type="number" required placeholder="Amount">

            <select name="time" required>
                <option value="">Time</option>
                <option value="0">Instant</option>
                <option value="1">1 sec</option>
                <option value="2">2 sec</option>
            </select>

            <input name="failed_attempts" type="number" required placeholder="Failed Attempts">

            <select name="is_new_device" required>
                <option value="">New Device?</option>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>

            <input name="avg_amount" type="number" required placeholder="Avg Amount">

            <button type="submit">Analyze Transaction</button>
        </form>

        <p id="status"></p>

        <div class="progress">
            <div id="bar" class="progress-bar"></div>
        </div>

        <p id="percent">0%</p>

        <button class="secondary-btn" onclick="resetForm()">Check Another Transaction</button>

        <h3>Risk Trend</h3>
        <canvas id="riskChart" height="120"></canvas>

    </div>

    <!-- RIGHT PANEL -->
    <div class="side">
        <h3>Live Stats</h3>
        <p>Total: <span id="total">0</span></p>
        <p>Fraud: <span id="frauds">0</span></p>
        <p>Safe: <span id="safe">0</span></p>
    </div>

</div>
<script>
let risk = parseFloat('{{ risk|default(0) }}') || 0;
let result = "{{ result|default('') }}";

let status = document.getElementById("status");
let bar = document.getElementById("bar");

// ✅ FIX: prevent duplicate counting
let alreadyProcessed = sessionStorage.getItem("processed");

// 🔥 Animate Stats
function animateValue(id, start, end, duration) {
    let range = end - start;
    if(range === 0) return;

    let current = start;
    let increment = end > start ? 1 : -1;
    let stepTime = Math.abs(Math.floor(duration / range));

    let timer = setInterval(function () {
        current += increment;
        document.getElementById(id).innerText = current;
        if (current == end) clearInterval(timer);
    }, stepTime);
}

function loadStats(){
    let total = parseInt(localStorage.getItem("total")) || 0;
    let frauds = parseInt(localStorage.getItem("frauds")) || 0;
    let safe = parseInt(localStorage.getItem("safe")) || 0;

    animateValue("total", 0, total, 500);
    animateValue("frauds", 0, frauds, 500);
    animateValue("safe", 0, safe, 500);
}

// 🔥 Update Stats
function updateStats(result){
    let total = parseInt(localStorage.getItem("total")) || 0;
    let frauds = parseInt(localStorage.getItem("frauds")) || 0;
    let safe = parseInt(localStorage.getItem("safe")) || 0;

    total++;
    if(result.includes("Fraud")) frauds++;
    else safe++;

    localStorage.setItem("total", total);
    localStorage.setItem("frauds", frauds);
    localStorage.setItem("safe", safe);

    loadStats();
    drawPie(frauds, safe);
}

// 🔥 PIE
function drawPie(fraud, safe){
    let ctx = document.getElementById("pieChart").getContext("2d");

    if(window.pie) window.pie.destroy();

    window.pie = new Chart(ctx,{
        type:"doughnut",
        data:{
            labels:["Fraud","Safe"],
            datasets:[{
                data:[fraud,safe],
                backgroundColor:["#ff4d4d","#00ff99"]
            }]
        },
        options:{
            plugins:{
                legend:{labels:{color:"white"}}
            }
        }
    });
}

// 🔥 LINE GRAPH
function drawLine(){
    let arr = JSON.parse(localStorage.getItem("riskData")) || [];
    if(!arr.length) return;

    let ctx=document.getElementById("riskChart").getContext("2d");

    if(window.line) window.line.destroy();

    window.line=new Chart(ctx,{
        type:"line",
        data:{
            labels:arr.map((_,i)=>"T"+(i+1)),
            datasets:[{
                label:"Risk %",
                data:arr,
                borderColor:"#00e5ff",
                backgroundColor:"rgba(0,229,255,0.2)",
                fill:true,
                tension:0.4
            }]
        },
        options:{
            plugins:{ legend:{display:false} }
        }
    });
}

// 🔥 RESULT
if(result !== "" && !alreadyProcessed){

    status.innerText=result;

    if(result.includes("Fraud")){
        status.className="fraud";
        bar.style.background="#ff4d4d";
        setTimeout(()=>alert("🚨 Fraud Detected!"),300);
    } else {
        status.className="safe";
        bar.style.background="#00ff99";
    }

    // Animated bar
    let i=0;
    let interval=setInterval(()=>{
        if(i>=risk){
            clearInterval(interval);
        } else {
            i++;
            bar.style.width=i+"%";
            document.getElementById("percent").innerText="Risk Score: "+i+"%";
        }
    },10);

    let arr = JSON.parse(localStorage.getItem("riskData")) || [];
    arr.push(risk);
    localStorage.setItem("riskData", JSON.stringify(arr));

    updateStats(result);

    // ✅ mark processed
    sessionStorage.setItem("processed","true");
}

function resetForm(){
    sessionStorage.removeItem("processed"); // ✅ reset fix
    window.location.href="/dashboard";
}

loadStats();
drawLine();
drawPie(
    parseInt(localStorage.getItem("frauds"))||0,
    parseInt(localStorage.getItem("safe"))||0
);
</script>
</body>
</html>
